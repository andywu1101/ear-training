<!DOCTYPE html>
<html lang="zh-Hant-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>音樂聽力練習</title>

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="聽力練習">
<meta name="theme-color" content="#33415c">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">

<style>
  :root{
    --paper: #efeee6;
    --panel: #fbfaf6;
    --panel-border: #ddd8c9;
    --hairline: #e2ddce;
    --ink: #262420;
    --ink-soft: #75705f;
    --accent: #33415c;
    --accent-soft: rgba(51,65,92,0.08);
    --font-display: 'Fraunces', serif;
    --font-body: 'Inter', sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  *{ box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body{
    margin:0; background: var(--paper); color: var(--ink); font-family: var(--font-body);
    min-height:100vh; padding: 48px 20px 64px;
  }
  .wrap{ max-width: 640px; margin: 0 auto; }

  .staff-line{ height:1px; background: var(--hairline); margin-bottom: 5px; }
  .staff-header{ margin-bottom: 26px; }

  h1{ font-family: var(--font-display); font-weight: 600; font-size: 32px; margin: 0 0 6px; letter-spacing: -0.01em; }
  .subtitle{ color: var(--ink-soft); font-size: 14.5px; margin: 0 0 34px; line-height: 1.6; }

  .menu-grid{ display:grid; grid-template-columns: 1fr; gap: 12px; }

  .menu-item{
    display:flex; align-items:center; gap: 16px;
    background: var(--panel); border: 1px solid var(--panel-border); border-radius: 14px;
    padding: 18px 20px; text-decoration:none; color: var(--ink);
    box-shadow: 0 1px 2px rgba(38,36,32,0.04), 0 8px 20px rgba(38,36,32,0.03);
    transition: transform 0.12s ease, border-color 0.12s ease;
  }
  .menu-item.active:hover{ border-color: var(--accent); transform: translateY(-1px); }
  .menu-item.disabled{ opacity: 0.55; cursor: default; }

  .menu-num{
    font-family: var(--font-mono); font-size: 13px; font-weight: 700; color: var(--accent);
    width: 34px; height: 34px; border-radius: 50%; background: var(--accent-soft);
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  .menu-text{ flex: 1; }
  .menu-title{ font-family: var(--font-display); font-weight: 600; font-size: 17px; margin-bottom: 2px; }
  .menu-desc{ font-size: 12.5px; color: var(--ink-soft); }
  .menu-badge{
    font-family: var(--font-mono); font-size: 10.5px; font-weight: 700; letter-spacing: 0.03em;
    padding: 4px 10px; border-radius: 999px; flex-shrink:0;
  }
  .menu-badge.ready{ background: rgba(75,122,91,0.12); color: #4b7a5b; }
  .menu-badge.soon{ background: var(--panel-border); color: var(--ink-soft); }

  .footer-note{ margin-top: 36px; font-size: 12px; color: var(--ink-soft); text-align:center; line-height:1.7; }
</style>
</head>
<body>
<div class="wrap">

  <div class="staff-header">
    <div class="staff-line"></div><div class="staff-line"></div><div class="staff-line"></div>
    <div class="staff-line"></div><div class="staff-line"></div>
  </div>

  <h1>音樂聽力練習</h1>
  <p class="subtitle">選擇一個項目開始練習。已完成的項目可以直接進入，其餘還在製作中。</p>

  <div class="menu-grid">
    <a class="menu-item disabled" href="javascript:void(0)">
      <div class="menu-num">1</div>
      <div class="menu-text">
        <div class="menu-title">音程練習</div>
        <div class="menu-desc">聽音程並判斷級數與性質</div>
      </div>
      <div class="menu-badge soon">敬請期待</div>
    </a>

    <a class="menu-item active" href="chord-trainer.html">
      <div class="menu-num">2</div>
      <div class="menu-text">
        <div class="menu-title">和絃辨認</div>
        <div class="menu-desc">聽和絃並判斷性質，含轉位、自訂和絃、連續聽寫</div>
      </div>
      <div class="menu-badge ready">開始練習</div>
    </a>

    <a class="menu-item disabled" href="javascript:void(0)">
      <div class="menu-num">3</div>
      <div class="menu-text">
        <div class="menu-title">節奏練習</div>
        <div class="menu-desc">聽節奏並寫下對應的五線譜節拍</div>
      </div>
      <div class="menu-badge soon">敬請期待</div>
    </a>

    <a class="menu-item disabled" href="javascript:void(0)">
      <div class="menu-num">4</div>
      <div class="menu-text">
        <div class="menu-title">單旋律曲調</div>
        <div class="menu-desc">聽單旋律並寫下對應的音高</div>
      </div>
      <div class="menu-badge soon">敬請期待</div>
    </a>

    <a class="menu-item disabled" href="javascript:void(0)">
      <div class="menu-num">5</div>
      <div class="menu-text">
        <div class="menu-title">兩聲部曲調</div>
        <div class="menu-desc">聽兩個聲部並分別寫下旋律</div>
      </div>
      <div class="menu-badge soon">敬請期待</div>
    </a>

    <a class="menu-item disabled" href="javascript:void(0)">
      <div class="menu-num">6</div>
      <div class="menu-text">
        <div class="menu-title">四部和聲進行</div>
        <div class="menu-desc">聽和聲進行並寫下對應的和絃級數</div>
      </div>
      <div class="menu-badge soon">敬請期待</div>
    </a>
  </div>

  <p class="footer-note">已加入主畫面？可以直接從主畫面圖示開啟，體驗會更接近原生 App。</p>
</div>

<script>
  if('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(() => {});
    });
  }
</script>
</body>
</html>
