      document.getElementById('fpt-statusBadge').textContent = `${this.curLevel.name}｜${this.bars}小節`;
      let _cap = document.getElementById('fpt-playCaption'); if (_cap) _cap.textContent = '請點擊上方按鈕聆聽和聲進行';
      this.updateKeyboardVisibility();
      this.updateUI();
      this.updatePlayBtns();
    },

    updateKeyboardVisibility: function() {
      document.getElementById('btn-deg-N').style.display = (this.curLevel.id >= 4) ? 'inline-block' : 'none';
      document.getElementById('btn-sev-switch').style.display = (this.curLevel.id >= 3) ? 'inline-block' : 'none';
      document.getElementById('btn-slash').style.display = (this.curLevel.id >= 4) ? 'inline-block' : 'none';
      document.getElementById('inv-btn-1').style.display = (this.curLevel.id >= 2) ? 'inline-block' : 'none';
      document.getElementById('inv-btn-2').style.display = (this.curLevel.id >= 2) ? 'inline-block' : 'none';
      // 增六和絃按鈕列：僅 Lv.5 顯示
      document.getElementById('kb-row-aug6').style.display = (this.curLevel.id >= 5) ? 'flex' : 'none';
      // 切換難度時重置 7 和絃開關與 42 按鈕，避免殘留上一個難度的狀態
      let sevBtn = document.getElementById('btn-sev-switch');
      sevBtn.classList.remove('active-toggle');
      sevBtn.textContent = '7和絃 [關]';
      document.querySelectorAll('.inv-btn').forEach((btn, idx) => {
        if (idx === 0) btn.textContent = '原位';
        if (idx === 1) btn.textContent = '6';
        if (idx === 2) btn.textContent = '64';
      });
      document.getElementById('inv-btn-3').style.display = 'none';
    },

    updateSlotsOverlay: function(targetSvgId = 'fpt-staff-svg', forceResults) {
      for (let i = 0; i < this.bars; i++) {
        let slot = document.getElementById(`${targetSvgId}-slot-${i}`);
        if (slot) {
          if (this.isSubmitted && forceResults) {
             let isOk = forceResults[i].chord;
             slot.className = 'chord-slot ' + (isOk ? 'correct' : 'wrong');
          } else {
             slot.className = 'chord-slot' + ((this.activeTab === 'chord' && i === this.activeSlot) ? ' active-slot' : '');
          }
          slot.innerHTML = `<div class="slot-bar-num">${i+1}</div><div class="slot-value" style="font-size:15px;">${this.userSeq[i] || '—'}</div>`;
        }
      }
      this.checkSubmitState();
    },

    checkSubmitState: function() {
      // 提交鈕永遠可按；未填完的格子會在提交時跳出確認提示，並計為錯誤
      let btn = document.getElementById('fpt-submitBtn');
      if (btn) btn.disabled = false;
    },

    updateUI: function() {
        this.renderStaff({});
        this.updateSlotsOverlay();
        this.checkSubmitState();
    },

    // 樂譜渲染核心 (支援雙軌焦點分離、防裁切)
    renderStaff: function(opt) {
      let targetSvgId = opt.targetSvgId || 'fpt-staff-svg';
      let bars = opt.bars || this.bars;
      let keyObj = opt.keyObj || this.keyObj;
      let userSeq = opt.userSeq || this.userSeq;
      let userBass = opt.userBass || this.userBass;
      let userKeyAns = opt.userKeyAns || this.userKeyAns;
      let isSubmitted = opt.isSubmitted !== undefined ? opt.isSubmitted : this.isSubmitted;
      let showAnswer = opt.showAnswer || false;
      let vDraw = opt.customVoicings || this.questionVoicings;
      let forceResults = opt.forceResults || null;
      // 正解和絃記號（供增六等特殊和絃的拼寫判斷）；showAnswer 時 userSeq 即為正解記號
      let questionSeq = opt.questionSeq || (showAnswer ? userSeq : (this.questionSeq || []));

      const container = document.getElementById(targetSvgId); if (!container) return;
      container.innerHTML = '';

      // 作答階段（主練習譜、尚未提交）只顯示低音譜表以節省空間；
      // 解答/複習/顯示正解時顯示完整大譜表（高音+低音四聲部）。
      let bassOnly = (targetSvgId === 'fpt-staff-svg') && !isSubmitted && !showAnswer;
      // 各區塊的垂直座標：大譜表用雙行、只顯示低音時把低音行提到最上方
      const BASS_TOP = bassOnly ? 4 : 115;
      const TREBLE_TOP = 15;
      const SVG_H = bassOnly ? 100 : 240;
      const SLOT_TOP = bassOnly ? 104 : 245; // 級數作答格 / 調性下拉的垂直位置
      
      let overlay = document.getElementById(targetSvgId + '-overlay');
      if (!overlay) {
        overlay = document.createElement('div'); overlay.id = targetSvgId + '-overlay';
        overlay.style.position = 'absolute'; overlay.style.top = '0px'; overlay.style.left = '0';
        overlay.style.width = '100%';
        overlay.style.pointerEvents = 'none'; 
        overlay.style.zIndex = '10';
        container.parentElement.appendChild(overlay);
      }
      overlay.style.height = (bassOnly ? 175 : 310) + 'px';
      overlay.innerHTML = '';

      // 精確修復寬度計算
      const width = Math.max(500, bars * 110 + 180) + 40; 
      const renderer = new VF.Renderer(container, VF.Renderer.Backends.SVG);
      renderer.resize(width, SVG_H);
      const ctx = renderer.getContext();
      
      let xPos = 30; // 右移防大括號裁切
      const barW = (width - 150) / bars; 
      let activeBarCenterX = null; // 供鏡頭跟隨使用：目前作答格的水平中心點

      for (let i = 0; i < bars; i++) {
        let isFirst = (i === 0); let w = isFirst ? barW + 80 : barW;
        let sT = bassOnly ? null : new VF.Stave(xPos, TREBLE_TOP, w);
        let sB = new VF.Stave(xPos, BASS_TOP, w);
        if (isFirst) { 
            if (sT) sT.addClef('treble').addKeySignature(keyObj.vfk).addTimeSignature('4/4'); 
            sB.addClef('bass').addKeySignature(keyObj.vfk).addTimeSignature('4/4'); 
        }
        if (i === bars - 1) {
            if (sT) sT.setEndBarType(VF.Barline.type.END);
            sB.setEndBarType(VF.Barline.type.END);
        }
        if (sT) sT.setContext(ctx).draw();
        sB.setContext(ctx).draw();
        if (isFirst && sT) {
          new VF.StaveConnector(sT, sB).setType(VF.StaveConnector.type.BRACE).setContext(ctx).draw();
          new VF.StaveConnector(sT, sB).setType(VF.StaveConnector.type.SINGLE_LEFT).setContext(ctx).draw();
        }

        let refStave = sT || sB;
        let startX = refStave.getNoteStartX(); let endX = refStave.getX() + refStave.getWidth();
        let slotLeft = startX; let slotWidth = endX - startX;

        if (targetSvgId === 'fpt-staff-svg' && i === this.activeSlot) {
            activeBarCenterX = slotLeft + slotWidth / 2;
        }

        // 生成調性下拉選單
        if (isFirst) {
            let ksDiv = document.createElement('div');
            ksDiv.style.position = 'absolute'; ksDiv.style.left = (refStave.getX()) + 'px'; 
            ksDiv.style.top = SLOT_TOP + 'px';
            ksDiv.style.width = Math.max(70, startX - refStave.getX() - 5) + 'px'; ksDiv.style.height = '64px';
            ksDiv.style.pointerEvents = 'auto';
            
            let optsHtml = '<option value="">調性?</option>';
            // 只列出本題調號對應的關係大調與關係小調（依實際調號，二選一）
            let keyPair = getRelativeKeyPair(keyObj);
            keyPair.forEach(k => { optsHtml += `<option value="${k.name}">${k.name.replace(' ','')}</option>`; });
            ksDiv.innerHTML = `<select id="fpt-keySelect-${targetSvgId}" class="select-box" style="width:100%; height:100%; font-size:12px; padding:0 4px; font-weight:700;">${optsHtml}</select>`;
            overlay.appendChild(ksDiv);
            
            setTimeout(() => {
                let ks = document.getElementById(`fpt-keySelect-${targetSvgId}`);
                if (ks) {
                    if (isSubmitted || showAnswer) {
                        ks.value = opt.forceCorrectSlots ? keyObj.name : (userKeyAns || keyObj.name);
                        let keyCorrect = opt.forceCorrectSlots ? true : (userKeyAns === keyObj.name);
                        ks.style.borderColor = keyCorrect ? 'var(--correct)' : 'var(--wrong)';
                        ks.style.backgroundColor = keyCorrect ? 'var(--correct-soft)' : 'var(--wrong-soft)';
                        ks.disabled = true;
                    } else {
                        if (userKeyAns) ks.value = userKeyAns;
                        ks.onchange = (e) => { window.fptModule.userKeyAns = e.target.value; window.fptModule.checkSubmitState(); };
                    }
                }
            }, 10);
        }

        // ====== 視覺焦點與全直行感應區 ======
        if (!isSubmitted && !showAnswer) {
            // 低音譜表感應區（點擊切換到 Bass 編輯）
            let hitTop = document.createElement('div');
            hitTop.className = 'hitbox-top';
            hitTop.style.left = slotLeft + 'px'; hitTop.style.width = slotWidth + 'px';
            hitTop.style.top = '0px';
            hitTop.style.height = (bassOnly ? 98 : 230) + 'px';
            hitTop.onclick = () => { 
                window.fptModule.switchTab('bass');
                window.fptModule.activeSlot = i; 
                window.fptModule.lastEditedBassSlot = null;
                window.fptModule.updateUI(); 
            };
            overlay.appendChild(hitTop);
            
            // 級數作答格感應區（點擊切換到 Chord 編輯）
            let hitBot = document.createElement('div');
            hitBot.className = 'hitbox-bot';
            hitBot.style.left = slotLeft + 'px'; hitBot.style.width = slotWidth + 'px';
            hitBot.style.top = (bassOnly ? 100 : 235) + 'px';
            hitBot.style.height = '72px';
            hitBot.onclick = () => { 
                window.fptModule.switchTab('chord');
                window.fptModule.activeSlot = i; 
                window.fptModule.lastEditedChordSlot = null;
                window.fptModule.updateUI(); 
            };
            overlay.appendChild(hitBot);
        }

        // 2. 視覺焦點：低音音高選取框
        if (!isSubmitted && !showAnswer && this.activeTab === 'bass' && i === this.activeSlot) {
            let noteBox = document.createElement('div');
            noteBox.className = 'active-note-box';
            noteBox.style.top = (bassOnly ? 14 : 125) + 'px'; // 低音譜表位置（隨模式調整）
            noteBox.style.left = slotLeft + 'px';
            noteBox.style.width = (slotWidth - 6) + 'px';
            noteBox.style.height = '74px';
            overlay.appendChild(noteBox);
        }

        // 3. 視覺焦點與作答框：級數作答格
        let slot = document.createElement('div');
        if (opt.forceCorrectSlots) slot.className = 'chord-slot correct';
        else if (isSubmitted || showAnswer) {
             if (forceResults) slot.className = 'chord-slot ' + (forceResults[i].chord ? 'correct' : 'wrong');
             else {
                 let uNorm = normalizeChord(userSeq[i], keyObj.isMin);
                 let qNorm = normalizeChord(this.questionSeq[i], keyObj.isMin);
                 slot.className = 'chord-slot ' + ((uNorm === qNorm) ? 'correct' : 'wrong');
             }
        }
        else {
             slot.className = 'chord-slot' + ((this.activeTab === 'chord' && i === this.activeSlot) ? ' active-slot' : '');
        }
        
        slot.id = `${targetSvgId}-slot-${i}`;
        slot.style.position = 'absolute'; slot.style.left = slotLeft + 'px'; 
        slot.style.top = SLOT_TOP + 'px'; 
        slot.style.width = (slotWidth - 6) + 'px'; slot.style.height = '64px';
        
        let dispVal = opt.forceCorrectSlots ? this.questionSeq[i] : (userSeq[i] || '—');
        slot.innerHTML = `<div class="slot-bar-num">${i+1}</div><div class="slot-value" style="font-size:15px;">${dispVal}</div>`;
        overlay.appendChild(slot);

        // ====== 渲染音符 ======
        let mAccT = {}; let mAccB = {};
        // 變化和絃（增六、拿坡里、副屬）使用專用拼寫修正調外變化音，避免調性表的自然音拼法拼錯
        let curSym = (questionSeq && questionSeq[i]) ? questionSeq[i] : '';
        let isAug6Here = (curSym === 'It6' || curSym === 'Fr6' || curSym === 'Ger6');
        let isN6Here = curSym.includes('N');
        let isSecDomHere = curSym.includes('/');
        let tonicLetterIdx = LETTERS.indexOf((keyObj.vfk || 'C')[0].toUpperCase());
        // 副屬和絃：算出目標根音的音級與字母（供專用拼寫用）
        let secDomTargetPc = null, secDomTargetLetterIdx = null;
        if (isSecDomHere) {
          let target = curSym.split('/')[1];
          // 目標級數 → 相對主音的級數位移（字母數）與音級（半音數）
          const DEG_INFO = {
            'I':[0,0],'i':[0,0],'II':[1,2],'ii':[1,2],'III':[2,4],'iii':[2,3],'III+':[2,4],
            'IV':[3,5],'iv':[3,5],'V':[4,7],'v':[4,7],'VI':[5,9],'vi':[5,9],'VII':[6,11],'vii':[6,10]
          };
          let info = DEG_INFO[target] || DEG_INFO[target.replace('°','')] ;
          if (info) {
            secDomTargetLetterIdx = (tonicLetterIdx + info[0]) % 7;
            secDomTargetPc = (keyObj.off + info[1]) % 12;
          }
        }
        let spellFn = (midi) => {
          if (isAug6Here) {
            let ov = spellAug6Tone(midi, keyObj.off, tonicLetterIdx);
            if (ov) return ov;
          }
          if (isN6Here) {
            let ov = spellNapolitanTone(midi, keyObj.off, tonicLetterIdx);
            if (ov) return ov;
          }
          if (isSecDomHere && secDomTargetPc !== null) {
            let ov = spellSecondaryDominantTone(midi, secDomTargetPc, secDomTargetLetterIdx);
            if (ov) return ov;
          }
          return getSpellingByMidiAndKey(midi, keyObj.name);
        };
        if (showAnswer || (isSubmitted && opt.forceCorrectSlots)) {
          let [s, a, t, b] = vDraw[i];
          let bSpell = spellFn(b); let tSpell = spellFn(t);
          let aSpell = spellFn(a); let sSpell = spellFn(s);

          let nS = new VF.StaveNote({ clef: 'treble', keys: [sSpell.keyStr], duration: 'w', stem_direction: 1 });
          let nA = new VF.StaveNote({ clef: 'treble', keys: [aSpell.keyStr], duration: 'w', stem_direction: -1 });
          let accS = getAccidentalToDraw(sSpell, mAccT, keyObj); if (accS) nS.addAccidental(0, new VF.Accidental(accS));
          let accA = getAccidentalToDraw(aSpell, mAccT, keyObj); if (accA) nA.addAccidental(0, new VF.Accidental(accA));
          
          let vT1 = new VF.Voice({ num_beats: 4, beat_value: 4 }).addTickables([nS]);
          let vT2 = new VF.Voice({ num_beats: 4, beat_value: 4 }).addTickables([nA]);
          new VF.Formatter().joinVoices([vT1, vT2]).format([vT1, vT2], slotWidth - 20);
          vT1.draw(ctx, sT); vT2.draw(ctx, sT);

          let nT = new VF.StaveNote({ clef: 'bass', keys: [tSpell.keyStr], duration: 'w', stem_direction: 1 });
          let nB = new VF.StaveNote({ clef: 'bass', keys: [bSpell.keyStr], duration: 'w', stem_direction: -1 });
          let accT = getAccidentalToDraw(tSpell, mAccB, keyObj); if (accT) nT.addAccidental(0, new VF.Accidental(accT));
          let accB = getAccidentalToDraw(bSpell, mAccB, keyObj); if (accB) nB.addAccidental(0, new VF.Accidental(accB));
          
          let vB1 = new VF.Voice({ num_beats: 4, beat_value: 4 }).addTickables([nT]);
          let vB2 = new VF.Voice({ num_beats: 4, beat_value: 4 }).addTickables([nB]);
          new VF.Formatter().joinVoices([vB1, vB2]).format([vB1, vB2], slotWidth - 20);
          vB1.draw(ctx, sB); vB2.draw(ctx, sB);
        } else {
          if (sT) {
            let rT = new VF.StaveNote({ clef: 'treble', keys: ['a/4'], duration: 'wr' });
            VF.Formatter.FormatAndDraw(ctx, sT, [rT]);
          }
          
          if (userBass[i] && !isSubmitted) {
             let ub = userBass[i];
             let uSpell = { keyStr: `${ub.step.toLowerCase()}${ub.acc==='n'?'':ub.acc}/${ub.oct}`, letter: ub.step, acc: ub.acc==='n'?'':ub.acc };
             let nB = new VF.StaveNote({ clef: 'bass', keys: [uSpell.keyStr], duration: 'w' });
             nB.setStyle({ fillStyle: 'var(--accent)', strokeStyle: 'var(--accent)' }); 
             let accB = getAccidentalToDraw(uSpell, mAccB, keyObj); if (accB) nB.addAccidental(0, new VF.Accidental(accB));
             VF.Formatter.FormatAndDraw(ctx, sB, [nB]);
          } else if (userBass[i] && isSubmitted && !opt.forceCorrectSlots) {
             let ub = userBass[i];
             let isBassCorrect = (ub.midi === vDraw[i][3]);
             let uSpell = { keyStr: `${ub.step.toLowerCase()}${ub.acc==='n'?'':ub.acc}/${ub.oct}`, letter: ub.step, acc: ub.acc==='n'?'':ub.acc };
             let nB = new VF.StaveNote({ clef: 'bass', keys: [uSpell.keyStr], duration: 'w' });
             if (!isBassCorrect) nB.setStyle({ fillStyle: 'var(--wrong)', strokeStyle: 'var(--wrong)' });
             let accB = getAccidentalToDraw(uSpell, mAccB, keyObj); if (accB) nB.addAccidental(0, new VF.Accidental(accB));
             VF.Formatter.FormatAndDraw(ctx, sB, [nB]);
          } else {
             let rB = new VF.StaveNote({ clef: 'bass', keys: ['d/3'], duration: 'wr' });
             VF.Formatter.FormatAndDraw(ctx, sB, [rB]);
          }
        }
        xPos += w;
      }

      // 鏡頭跟隨：只有在「自動往下跳格」時才捲動，手動點選某一格不強制捲動
      if (targetSvgId === 'fpt-staff-svg' && this._shouldFollowScroll && activeBarCenterX !== null) {
        const scrollEl = document.getElementById('staffContainerOuter');
        if (scrollEl) {
          const target = Math.max(0, activeBarCenterX - scrollEl.clientWidth / 2);
          scrollEl.scrollTo({ left: target, behavior: 'smooth' });
        }
        this._shouldFollowScroll = false;
      }
    },

    playProgression: function(modeStr) {
      if (!pianoInst || this.isPlaying) return;
      this.isPlaying = true; 
      this.hasPlayed = true; 
      this.updatePlayBtns();
      this.updateSlotsOverlay(); 
      
      let capEl = document.getElementById('fpt-playCaption');
      if (capEl) capEl.textContent = '🎵 標準音 A4，準備聆聽題目...';

      const ctx = ensureAudio();
      // 先給作答者標準音 A4（MIDI 69），音量比照題目外聲部（gain 3.5），約 1 秒，
      // 之後停頓 2 秒才開始播放題目。
      let refStart = ctx.currentTime + 0.1;
      pianoInst.play(69, refStart, { duration: 1.0, gain: 3.5 });
      let t = refStart + 1.0 + 2.0; // 標準音 1 秒 + 停頓 2 秒
      let secPerBeat = 60 / this.bpm;
      let measureDur = 4 * secPerBeat;

      // 標準音與停頓結束後，更新提示文字為正在播放題目
      const capTimer = setTimeout(() => {
        if (this.isPlaying && capEl) capEl.textContent = `🔊 正在播放 (${modeStr === 'block'?'完整四部':'分解＋完整'})...`;
      }, (t - ctx.currentTime) * 1000);
      pendingTimers.push(capTimer);

      this.questionVoicings.forEach((v) => {
        let [s, a, tn, b] = v;
        if (modeStr === 'block') {
            pianoInst.play(b, t - 0.010, { duration: measureDur * 0.95, gain: 3.5 });
            pianoInst.play(tn, t, { duration: measureDur * 0.95, gain: 3.5 });
            pianoInst.play(a, t, { duration: measureDur * 0.95, gain: 3.5 });
            pianoInst.play(s, t, { duration: measureDur * 0.95, gain: 3.5 });
        } else if (modeStr === 'arpeggio') {
            pianoInst.play(b, t, { duration: measureDur, gain: 3.5 });
            pianoInst.play(tn, t + 0.3, { duration: measureDur - 0.3, gain: 3.5 });
            pianoInst.play(a, t + 0.6, { duration: measureDur - 0.6, gain: 3.5 });
            pianoInst.play(s, t + 0.9, { duration: measureDur - 0.9, gain: 3.5 });
            
            let remDur = Math.max(0.5, measureDur - 1.2);
            pianoInst.play(b, t + 1.2 - 0.010, { duration: remDur * 0.95, gain: 3.5 });
            pianoInst.play(tn, t + 1.2, { duration: remDur * 0.95, gain: 3.5 });
            pianoInst.play(a, t + 1.2, { duration: remDur * 0.95, gain: 3.5 });
            pianoInst.play(s, t + 1.2, { duration: remDur * 0.95, gain: 3.5 });
        }
        t += measureDur;
      });

      const timer = setTimeout(() => {
        this.isPlaying = false; this.updatePlayBtns();
        if (capEl) capEl.textContent = '✅ 播放完畢，請切換頁籤填寫低音與級數！';
      }, (t - ctx.currentTime) * 1000 + 100);
      pendingTimers.push(timer);
    },

    playReview: function(id, modeStr) {
        let item = this.reviewItems.find(r => r.id === id);
        if (!item || !pianoInst || this.isPlaying) return;
        this.isPlaying = true;
        const ctx = ensureAudio();
        // 訂正播放：不播標準音、不停頓，直接聆聽和聲
        let t = ctx.currentTime + 0.1;
        let secPerBeat = 60 / this.bpm;
        let measureDur = 4 * secPerBeat;

        item.questionVoicings.forEach((v) => {
            let [s, a, tn, b] = v;
            if (modeStr === 'block') {
                pianoInst.play(b, t - 0.010, { duration: measureDur * 0.95, gain: 3.5 });
                pianoInst.play(tn, t, { duration: measureDur * 0.95, gain: 3.5 });
                pianoInst.play(a, t, { duration: measureDur * 0.95, gain: 3.5 });
                pianoInst.play(s, t, { duration: measureDur * 0.95, gain: 3.5 });
            } else if (modeStr === 'arpeggio') {
                pianoInst.play(b, t, { duration: measureDur, gain: 3.5 });
                pianoInst.play(tn, t + 0.3, { duration: measureDur - 0.3, gain: 3.5 });
                pianoInst.play(a, t + 0.6, { duration: measureDur - 0.6, gain: 3.5 });
                pianoInst.play(s, t + 0.9, { duration: measureDur - 0.9, gain: 3.5 });
                
                let remDur = Math.max(0.5, measureDur - 1.2);
                pianoInst.play(b, t + 1.2 - 0.010, { duration: remDur * 0.95, gain: 3.5 });
                pianoInst.play(tn, t + 1.2, { duration: remDur * 0.95, gain: 3.5 });
                pianoInst.play(a, t + 1.2, { duration: remDur * 0.95, gain: 3.5 });
                pianoInst.play(s, t + 1.2, { duration: remDur * 0.95, gain: 3.5 });
            }
            t += measureDur;
        });
        const timer = setTimeout(() => { this.isPlaying = false; }, (t - ctx.currentTime) * 1000 + 100);
        pendingTimers.push(timer);
    },

    updatePlayBtns: function() {
      const btns = ['btn-play-all', 'btn-play-arp'];
      btns.forEach(id => {
        let b = document.getElementById(id);
        if (!b) return;
        if (this.isPlaying) b.disabled = true;
        else b.disabled = !pianoInst || (this.mode === 'test' && this.testSession && this.testSession.replaysLeft <= 0);
      });
      // 解答頁的播放按鈕（不受測驗次數限制）
      ['btn-play-all-ans', 'btn-play-arp-ans'].forEach(id => {
        let b = document.getElementById(id);
        if (b) b.disabled = this.isPlaying || !pianoInst;
      });
      if (!this.isPlaying && this.mode === 'test' && this.testSession) {
        document.getElementById('btn-play-all').textContent = `🔊 完整四部 (剩 ${this.testSession.replaysLeft} 次)`;
      } else if (!this.isPlaying) {
        document.getElementById('btn-play-all').textContent = '🔊 完整四部 (SATB)';
      }
    },

    submitAnswer: function() {
      // 提交前檢查未完成項目，跳出確認提示
      let emptyBass = this.userBass.filter(v => v === null).length;
      let emptySeq = this.userSeq.filter(v => v === '' || v.endsWith('/')).length;
      let keyMissing = !this.userKeyAns;
      let issues = [];
      if (keyMissing) issues.push('調性尚未選擇');
      if (emptyBass > 0) issues.push(`${emptyBass} 格低音未填`);
      if (emptySeq > 0) issues.push(`${emptySeq} 格級數未填或未完成`);
      if (issues.length > 0) {
        let msg = '尚有未完成項目：\n・' + issues.join('\n・') + '\n\n未填的部分會計為錯誤，確定要提交嗎？';
        if (!window.confirm(msg)) return;
      }

      window.fptStopAll();
      this.isSubmitted = true;
      let allCorrect = true;
      let results = [];

      let keyCorrect = (this.userKeyAns === this.keyObj.name);
      if (!keyCorrect) allCorrect = false;

      for (let i = 0; i < this.bars; i++) {
        let uNorm = normalizeChord(this.userSeq[i], this.keyObj.isMin);
        let qNorm = normalizeChord(this.questionSeq[i], this.keyObj.isMin);
        let isChordC = (this.userSeq[i] !== '' && uNorm === qNorm);
        // 未填低音 (null) 視為錯誤，不再直接讀取 .midi 造成 crash
        let isBassC = (this.userBass[i] != null) && (this.userBass[i].midi === this.questionVoicings[i][3]);
        
        results.push({ chord: isChordC, bass: isBassC });
        if (!isChordC || !isBassC) allCorrect = false;
      }

      // 在解答頁渲染雙譜表對照：上=你的作答（紅色標錯）、下=標準正解（完整四聲部）
      this.renderStaff({
          targetSvgId: 'fpt-ansUser-svg', bars: this.bars, keyObj: this.keyObj,
          userSeq: this.userSeq, userBass: this.userBass, userKeyAns: this.userKeyAns,
          isSubmitted: true, showAnswer: false, customVoicings: this.questionVoicings, forceResults: results
      });
      this.renderStaff({
          targetSvgId: 'fpt-ansCorrect-svg', bars: this.bars, keyObj: this.keyObj,
          userSeq: this.questionSeq, userBass: this.userBass, userKeyAns: this.keyObj.name,
          isSubmitted: true, showAnswer: true, customVoicings: this.questionVoicings, forceCorrectSlots: true
      });
      // 兩個譜表捲軸同步
      setTimeout(() => {
        let ua = document.getElementById('ansUserScroll');
        let ca = document.getElementById('ansCorrectScroll');
        if (ua && ca && !ua._syncBound) {
          ua._syncBound = true;
          let syncing = false;
          let link = (from, to) => from.addEventListener('scroll', () => {
            if (syncing) { syncing = false; return; }
            syncing = true; to.scrollLeft = from.scrollLeft;
          }, { passive: true });
          link(ua, ca); link(ca, ua);
        }
      }, 60);

      const ft = document.getElementById('fpt-feedbackText');
      if (allCorrect) {
        ft.textContent = '🎉 完美成真！調性、低音與對位聽覺完全是頂尖水準！';
        ft.className = 'feedback-text correct';
        this.score.c++;
      } else {
        let hasBassErr = results.some(r => !r.bass);
        let hasChordErr = results.some(r => !r.chord);
        if (hasBassErr && hasChordErr) {
            ft.textContent = '❌ 低音與級數都有錯喔！完整正解如下，也已收進錯題本：';
            ft.className = 'feedback-text wrong';
        } else if (hasBassErr) {
            ft.textContent = '⚠️ 級數寫對了，但低音抓錯囉！完整正解如下，已收進錯題本：';
            ft.className = 'feedback-text partial';
        } else {
            ft.textContent = '⚠️ 低音全對！但和絃性質或轉位判斷有誤，完整正解如下，已收進錯題本：';
            ft.className = 'feedback-text partial';
        }
        this.addToReview(results, keyCorrect);
      }
      this.score.t++;
      let scoreText = `${this.score.c}/${this.score.t}`;
      document.getElementById('fpt-scoreNum').textContent = scoreText;
      document.getElementById('fpt-scoreNumAns').textContent = scoreText;
      document.getElementById('fpt-answerBadge').textContent = allCorrect ? '✅ 答對了' : '📖 解答對照';
      this.updatePlayBtns();
      showPage('fpt-answer');
      // 答案頁捲軸重置回第一小節（兩個譜表都歸零）
      setTimeout(() => {
        let ua = document.getElementById('ansUserScroll');
        let ca = document.getElementById('ansCorrectScroll');
        if (ua) ua.scrollLeft = 0;
        if (ca) ca.scrollLeft = 0;
      }, 80);
    },

    addToReview: function(results, keyCorrect) {
      const id = this.reviewItems.length + 1;
      // 只儲存錯題資料，實際渲染延到進入錯題本頁時才做（節省效能）
      this.reviewItems.push({
          id: id, bars: this.bars, keyObj: this.keyObj,
          userKeyAns: this.userKeyAns, userSeq: [...this.userSeq], userBass: JSON.parse(JSON.stringify(this.userBass)),
          questionSeq: [...this.questionSeq], questionVoicings: [...this.questionVoicings],
          results: results.map(r => ({...r}))
      });
      this.updateReviewCount();
    },

    updateReviewCount: function() {
      let el = document.getElementById('fpt-reviewCount');
      if (el) el.textContent = this.reviewItems.length;
    },

    // 進入錯題本頁時，渲染所有累積的錯題（你的作答 vs 標準正解，捲軸同步）
    renderReviewPage: function() {
      const list = document.getElementById('fpt-reviewList');
      const empty = document.getElementById('fpt-reviewEmpty');
      if (!list) return;
      list.innerHTML = '';
      if (this.reviewItems.length === 0) { if (empty) empty.style.display = 'block'; return; }
      if (empty) empty.style.display = 'none';

      // 由新到舊排列
      let items = [...this.reviewItems].reverse();
      items.forEach(rItem => {
        let id = rItem.id;
        let box = document.createElement('div'); box.className = 'review-item';
        box.innerHTML = `
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <span style="font-weight:700; color:var(--wrong);">❌ 錯題 #${id} (正解: ${rItem.keyObj.name})</span>
          </div>
          <div class="review-label">你的作答 (紅色為錯誤)：</div>
          <div style="display:flex; gap:8px; margin-bottom:8px;">
             <button class="action-btn" style="border-color:var(--correct); color:var(--correct);" onclick="window.fptModule.playReview(${id}, 'block')">🔊 聽完整正解</button>
             <button class="action-btn" style="border-color:var(--correct); color:var(--correct);" onclick="window.fptModule.playReview(${id}, 'arpeggio')">🎵 聽分解正解</button>
          </div>
          <div class="review-staff" id="rev-user-scroll-${id}">
            <div style="position:relative; width:max-content; min-width:100%; height:320px;">
               <div id="rev-user-${id}"></div>
            </div>
          </div>
          <div class="review-label" style="margin-top:8px;">標準正解：</div>
          <div class="review-staff" id="rev-correct-scroll-${id}">
            <div style="position:relative; width:max-content; min-width:100%; height:320px;">
               <div id="rev-correct-${id}"></div>
            </div>
          </div>
        `;
        list.appendChild(box);
      });

      setTimeout(() => {
        items.forEach(rItem => {
          let id = rItem.id;
          this.renderStaff({
              targetSvgId: `rev-user-${id}`, bars: rItem.bars, keyObj: rItem.keyObj,
              userSeq: rItem.userSeq, questionSeq: rItem.questionSeq, userBass: rItem.userBass, userKeyAns: rItem.userKeyAns,
              isSubmitted: true, showAnswer: false, customVoicings: rItem.questionVoicings, forceResults: rItem.results
          });
          this.renderStaff({
              targetSvgId: `rev-correct-${id}`, bars: rItem.bars, keyObj: rItem.keyObj,
              userSeq: rItem.questionSeq, questionSeq: rItem.questionSeq, userBass: rItem.userBass, userKeyAns: rItem.keyObj.name,
              isSubmitted: true, showAnswer: true, customVoicings: rItem.questionVoicings, forceCorrectSlots: true
          });
          let ua = document.getElementById(`rev-user-scroll-${id}`);
          let ca = document.getElementById(`rev-correct-scroll-${id}`);
          if (ua && ca) {
            let syncing = false;
            let link = (from, to) => from.addEventListener('scroll', () => {
              if (syncing) { syncing = false; return; }
              syncing = true; to.scrollLeft = from.scrollLeft;
            }, { passive: true });
            link(ua, ca); link(ca, ua);
          }
        });
      }, 50);
    },

    setupEvents: function() {
      document.querySelectorAll('#fpt-modeSwitch .mode-btn').forEach(b => b.onclick = () => {
        this.mode = b.dataset.mode; document.querySelectorAll('#fpt-modeSwitch .mode-btn').forEach(x=>x.classList.toggle('active',x===b));
        document.getElementById('testReplayWrapper').style.display = this.mode === 'test' ? 'flex' : 'none';
      });
      document.querySelectorAll('#fpt-keySwitch .mode-btn').forEach(b => b.onclick = () => {
        this.keyPref = b.dataset.key; document.querySelectorAll('#fpt-keySwitch .mode-btn').forEach(x=>x.classList.toggle('active',x===b));
      });

      document.getElementById('fpt-enterBtn').onclick = () => {
        ensureAudio(); window.fptStopAll();
        this.bars = parseInt(document.getElementById('fpt-barsSelect').value, 10);
        this.bpm = parseInt(document.getElementById('fpt-bpm').value, 10);
        if (this.mode === 'test') {
          let max = parseInt(document.getElementById('fpt-testReplaySelect').value, 10);
          this.testSession = { replaysLeft: max, total: max };
        } else this.testSession = null;
        
        this.generateQuestion();
        showPage('fpt-practice');
        this.switchTab('bass');
        setTimeout(() => { let el = document.getElementById('staffContainerOuter'); if (el) el.scrollLeft = 0; }, 80);
      };

      document.getElementById('btn-play-all').onclick = () => { if(this.mode==='test'&&this.testSession)this.testSession.replaysLeft--; this.playProgression('block'); };
      document.getElementById('btn-play-arp').onclick = () => { if(this.mode==='test'&&this.testSession)this.testSession.replaysLeft--; this.playProgression('arpeggio'); };
      // 解答頁的播放按鈕（不受測驗次數限制，可自由聆聽正解）
      document.getElementById('btn-play-all-ans').onclick = () => this.playProgression('block');
      document.getElementById('btn-play-arp-ans').onclick = () => this.playProgression('arpeggio');

      document.getElementById('btn-case-switch').onclick = (e) => {
        e.target.classList.toggle('active-toggle');
        let isUpper = e.target.classList.contains('active-toggle');
        e.target.textContent = isUpper ? '大寫 (A)' : '小寫 (a)';
        document.querySelectorAll('.deg-btn').forEach((btn, idx) => {
          if (btn.dataset.deg !== 'N') btn.textContent = isUpper ? ['I','II','III','IV','V','VI','VII'][idx] : ['i','ii','iii','iv','v','vi','vii'][idx];
        });
      };
      document.getElementById('btn-sev-switch').onclick = (e) => {
        e.target.classList.toggle('active-toggle');
        let isSev = e.target.classList.contains('active-toggle');
        e.target.textContent = isSev ? '7和絃 [開]' : '7和絃 [關]';
        document.querySelectorAll('.inv-btn').forEach((btn, idx) => {
          if (idx === 0) btn.textContent = isSev ? '7' : '原位';
          if (idx === 1) btn.textContent = isSev ? '65' : '6';
          if (idx === 2) btn.textContent = isSev ? '43' : '64';
        });
        // 第三轉位 42 只存在於七和絃，一般三和絃沒有，因此只在 7 和絃模式顯示
        let btn42 = document.getElementById('inv-btn-3');
        if (btn42) btn42.style.display = (isSev && this.curLevel.id >= 3) ? 'inline-block' : 'none';
      };

      document.querySelectorAll('.deg-btn').forEach(b => b.onclick = () => this.handleKbInput('deg', b.dataset.deg));
      document.querySelectorAll('.inv-btn').forEach(b => b.onclick = () => this.handleKbInput('inv', b.dataset.inv));
      document.querySelectorAll('.mod-btn').forEach(b => b.onclick = () => this.handleKbInput('mod', b.dataset.mod));
      document.querySelectorAll('.aug6-btn').forEach(b => b.onclick = () => this.handleKbInput('aug6', b.dataset.aug6));
      
      document.getElementById('kb-backspace').onclick = () => this.handleKbInput('back');
      document.getElementById('kb-clear').onclick = () => this.handleKbInput('clear');

      document.getElementById('fpt-submitBtn').onclick = () => this.submitAnswer();
      document.getElementById('fpt-nextBtn').onclick = () => {
        window.fptStopAll();
        document.getElementById('fpt-feedbackText').className = 'feedback-text';
        document.getElementById('fpt-feedbackText').textContent = '';
        this.generateQuestion();
        this.switchTab('bass');
        showPage('fpt-practice');
        // 作答譜例捲軸回第一小節
        setTimeout(() => { let el = document.getElementById('staffContainerOuter'); if (el) el.scrollLeft = 0; }, 80);
      };

      // 錯題本清空
      let clearBtn = document.getElementById('fpt-clearReviewBtn');
      if (clearBtn) clearBtn.onclick = () => {
        if (this.reviewItems.length === 0) return;
        if (window.confirm('確定要清空所有錯題紀錄嗎？此動作無法復原。')) {
          this.reviewItems = [];
          this.updateReviewCount();
          this.renderReviewPage();
        }
      };

      window.addEventListener('resize', () => { if(document.getElementById('pageFptPractice').classList.contains('active')) this.updateUI(); });
    }
  };

  window.fptModule = fptModule;
  fptModule.init(); loadPiano();
})();
</script>
<script>
  if('serviceWorker' in navigator){
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('service-worker.js').catch(() => {});
    });
  }
</script>
